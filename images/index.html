<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Island Frame-by-Frame Wave Loader</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <section id="loader" class="loader">
    <div class="snow"></div>

    <div id="waveLogo" class="wave-logo">
      <div id="slices" class="slices"></div>
      <img class="clean-final" src="./island-wave-logo.svg" alt="Island logo">
    </div>

    <p class="note">This site saves your progress automatically. Please do not close this page while loading is active.</p>
    <span class="save-icon"></span>
  </section>

  <main class="page">
    <h1>Loaded</h1>
    <button id="replay">Replay frame wave</button>
  </main>

  <script src="./script.js"></script>
</body>
</html>
